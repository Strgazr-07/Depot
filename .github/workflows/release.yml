name: release

# Push a tag like v0.2.0 to build binaries for every platform and attach them
# to a GitHub Release. The npm package (getdepot) downloads these at install
# time, so the tag/version must match npm/package.json's "version".
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage asset
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/depot${{ matrix.ext }}"
          dst="depot-${{ matrix.target }}${{ matrix.ext }}"
          cp "$src" "$dst"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: depot-${{ matrix.target }}${{ matrix.ext }}
